name: Build, Test & Lint

on: [push, pull_request]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Cache ANTLR4 JAR
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/antlr/antlr4
          key: antlr4-4.13.2
      - name: Install ANTLR4
        run: pip install 'antlr4-tools==0.2.2'
      - name: Generate parser
        run: make grammar
        env:
          ANTLR4_TOOLS_ANTLR_VERSION: '4.13.2'
      - name: Build
        run: make build
      - name: Test
        run: make test
      - name: Check MDL example scripts
        run: |
          FAILED=0
          for f in mdl-examples/doctype-tests/*.mdl; do
            case "$f" in *.test.mdl) continue ;; esac
            NAME=$(basename "$f")
            echo "::group::$NAME"
            if ./bin/mxcli check "$f"; then
              echo "PASS: $NAME"
            else
              echo "::error file=$f::Syntax check failed: $NAME"
              FAILED=1
            fi
            echo "::endgroup::"
          done
          exit $FAILED
      - name: Setup mxbuild
        run: ./bin/mxcli setup mxbuild --version 11.9.0
      - name: Integration tests
        run: make test-integration
        timeout-minutes: 30
      - name: Lint Go
        run: make lint-go
      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
